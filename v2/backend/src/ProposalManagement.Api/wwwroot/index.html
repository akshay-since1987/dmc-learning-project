<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>धुळे महानगरपालिका — Proposal Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>
    <a href="#main-content" class="skip-link visually-hidden-focusable">Skip to main content</a>

    <!-- App Shell -->
    <div id="app">
        <!-- Header (injected by JS when authenticated) -->
        <header id="app-header"></header>

        <!-- Layout wrapper -->
        <div id="app-layout" class="d-flex">
            <!-- Sidebar (injected by JS when authenticated) -->
            <nav id="app-sidebar" aria-label="Main navigation"></nav>

            <!-- Main content area -->
            <main id="main-content" class="flex-grow-1">
                <div id="page-content" class="p-4">
                    <!-- Page content loaded here by router -->
                </div>
            </main>
        </div>
    </div>

    <!-- Toast container for notifications -->
    <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" aria-live="polite"></div>

    <!-- Loading overlay -->
    <div id="loading-overlay" class="d-none" aria-busy="true">
        <div class="loading-spinner">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
